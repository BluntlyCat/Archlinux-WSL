name: Build WSL image

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  IMAGE_NAME: archlinux
  CONTAINER_NAME: archlinux
  OUTPUT_NAME: archlinux.wsl

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Create dist directory
        run: mkdir -p dist

      - name: Set release filename
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "RELEASE_FILENAME=archlinux-${GITHUB_REF_NAME}.wsl" >> "$GITHUB_ENV"
          else
            echo "RELEASE_FILENAME=archlinux.wsl" >> "$GITHUB_ENV"
          fi

      - name: Build Docker image
        run: docker build -t "${IMAGE_NAME}" .

      - name: Remove old container if present
        run: |
          if docker ps -a --format '{{.Names}}' | grep -Fxq "${CONTAINER_NAME}"; then
            docker rm -f "${CONTAINER_NAME}"
          fi

      - name: Create container
        run: docker create --name "${CONTAINER_NAME}" "${IMAGE_NAME}"

      - name: Export rootfs as .wsl
        run: docker export "${CONTAINER_NAME}" -o "dist/${RELEASE_FILENAME}"

      - name: Clean up container
        if: always()
        run: docker rm -f "${CONTAINER_NAME}" || true

      - name: Upload .wsl artifact
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-wsl
          path: dist/${{ env.RELEASE_FILENAME }}
          if-no-files-found: error
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/${RELEASE_FILENAME}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes